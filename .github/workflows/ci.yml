name: CI

on:
  pull_request

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test ROS2 package
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ROS2 docker image
        run: |
          ./scripts/build-docker-image.sh

      - name: Build package and run tests
        run: |
          ./scripts/build-package.sh --docker --test