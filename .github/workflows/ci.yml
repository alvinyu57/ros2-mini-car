name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Build and test ROS2 package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ROS2 docker image
        run: |
          ./scripts/build-docker-image.sh

      - name: Build package and run tests
        run: |
          ./scripts/build-package.sh --docker --test

  publish-docker-image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: test
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ROS2 docker image
        run: |
          ./scripts/build-docker-image.sh

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image
        run: |
          source .env
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}/ros-lyrical-builder"
          
          docker tag ros-lyrical-builder "${image_name}:${DOCKER_IMAGE_VERSION}"
          docker push "${image_name}:${DOCKER_IMAGE_VERSION}"
