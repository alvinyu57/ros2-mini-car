name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Build and test ROS 2 ${{ matrix.ros-distro }} package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ros-distro:
          - lyrical
          - jazzy

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ROS2 docker image
        working-directory: ros2-${{ matrix.ros-distro }}
        run: |
          ./scripts/build-docker-image.sh

      - name: Build package and run tests
        working-directory: ros2-${{ matrix.ros-distro }}
        run: |
          ./scripts/build-package.sh --docker --test

  publish-docker-image:
    name: Publish ROS 2 ${{ matrix.ros-distro }} Docker image
    runs-on: ubuntu-latest
    needs: test
    env:
      GH_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ros-${{ matrix.ros-distro }}-builder
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ros-distro:
          - lyrical
          - jazzy

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ROS2 docker image
        working-directory: ros2-${{ matrix.ros-distro }}
        run: |
          ./scripts/build-docker-image.sh

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker image
        working-directory: ros2-${{ matrix.ros-distro }}
        run: |
          set -a
          source .env
          set +a

          docker push "${GH_IMAGE_NAME}:${DOCKER_IMAGE_VERSION}"
